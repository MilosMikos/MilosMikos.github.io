name: Build and Deploy

on:
  push:
    branches:
      - main         # déploie seulement depuis main
      - 11ty-dev    # build seulement (pour tester), pas de déploiement

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build with 11ty
        run: npm run build

      - name: Upload artifact (pour vérifier le résultat)
        uses: actions/upload-artifact@v4
        with:
          name: site-build
          path: _site/

      # Ce bloc ne s'exécute QUE sur main
      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
      - name: Verify _site output
        run: |
          echo "Contenu de _site :"
          ls -la _site/
          echo "Nombre de fichiers :"
          find _site -type f | wc -l